<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="home">
            <div class="home_content">
                <h1 class="home_title">HELP I HAVE TWENTY MINUTES BEFORE MY TEST WHAT DO I DO!?</h1>
                
                <div class="home_buttons">
                    <button class="sgi_open_button primary_button">▶️ Run Study Guide</button>
                    <button class="sgi_edit_button secondary_button">✏️ Edit Study Guide</button>
                </div>
                
                <div class="slide_sets_container">
                    <h3>📚 Your Slide Sets</h3>
                    <button class="save_current_button">💾 Save Current</button>
                    <div class="slide_sets_scrollable" id="slide_sets_scrollable"></div>
                </div>
            </div>
        </div>
        <div class="study_guide_interface">
            <div class="slide">
                <p class="slide_title">Title</p>
                <p class="slide_content"></p>
                <img class="slide_image" src="ellenjoe.webp" alt="Slide Image">
                <button class="slide_button_1">Button 1</button>
                <button class="slide_button_2">Button 2</button>
                <button class="slide_button_3">Button 3</button>
                <button class="slide_button_4">Button 4</button>
                <div class="fill_blank_container" style="display: none;">
                    <input type="text" class="fill_blank_input" id="fill_blank_input" placeholder="Type the word here...">
                    <button class="fill_blank_submit">Submit</button>
                    <p class="fill_blank_feedback" id="fill_blank_feedback"></p>
                </div>
            </div>
            <button class="sgi_next_button">Next Slide</button>
            <button class="sgi_close_button">Close</button>
        </div>
        <div class="study_guide_creator">
            <h2>Study Guide Creator</h2>
            <div class="sgc_grid_container" id="sgc_grid_container"></div>
            <button class="sgc_add_slide_button">➕ Add Slide</button>
            <button class="sgc_export_button">Export Slides</button>
            <button class="sgc_import_button">Import Slides</button>
            <button class="sgc_close_button">Close</button>
            <button class="sgc_blank_all_button">Blank All Slides</button>
        </div>
        
        <div class="edit_modal" id="edit_modal">
            <div class="edit_modal_content">
                <h2>Edit Slide</h2>

                <label>Slide Type:</label>
                <select id="edit_class" class="edit_input">
                    <option value="information">Information</option>
                    <option value="question">Question</option>
                    <option value="fill-in-the-blank">Fill in the Blank</option>
                </select>
                
                <label>Title:</label>
                <input type="text" id="edit_title" class="edit_input">
                
                <label>Content:</label>
                <textarea id="edit_content" class="edit_input" rows="4"></textarea>
                
                <div id="question_fields">
                    <label>Answer 1 Text:</label>
                    <input type="text" id="edit_button1" class="edit_input">
                    
                    <label>Answer 2 Text:</label>
                    <input type="text" id="edit_button2" class="edit_input">
                    
                    <label>Answer 3 Text:</label>
                    <input type="text" id="edit_button3" class="edit_input">
                    
                    <label>Answer 4 Text:</label>
                    <input type="text" id="edit_button4" class="edit_input">
                    
                    <label>Correct Answer:</label>
                    <select id="edit_correct_answer" class="edit_input">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                
                <div id="fill_blank_fields" style="display: none;">
                    <label>Correct Answer Word:</label>
                    <input type="text" id="edit_blank_answer" class="edit_input" placeholder="Enter the correct word">
                </div>
                
                <label>Has Image:</label>
                <input type="checkbox" id="edit_has_image" class="edit_checkbox">
                
                <div id="image_selection" style="display: none;">
                    <label>Select Image:</label>
                    <select id="edit_image" class="edit_input">
                        <option value="earth.png">Planet Earth</option>
                        <option value="lofi.jpeg">Lofi Girl</option>
                        <option value="studying.jpeg">Studying Meme</option>
                        <option value="nebula.jpeg">Nebula</option>
                        <option value="darkspace.jpeg">Space</option>
                        <option value="virus.jpeg">Virus</option>
                        <option value="ellenjoe.webp">Ellen Joe</option>
                    </select>
                </div>
                
                <button class="edit_save_button">SAVE</button>
                <button class="edit_delete_button">🗑️ Delete Slide</button>
                <button class="edit_back_button">Back</button>
            </div>
        </div>
        
        <div class="export_modal" id="export_modal">
            <div class="modal_content">
                <h2>Export Slides</h2>
                <p>Copy the JSON below and save it to share:</p>
                <textarea id="export_json" class="export_json_textarea" readonly></textarea>
                <button class="modal_copy_button">Copy to Clipboard</button>
                <button class="modal_close_button" onclick="document.getElementById('export_modal').classList.remove('show')">Close</button>
            </div>
        </div>
        
        <div class="import_modal" id="import_modal">
            <div class="modal_content">
                <h2>Import Slides</h2>
                <p>Paste your JSON here:</p>
                <textarea id="import_json" class="import_json_textarea" rows="10"></textarea>
                <button class="modal_import_button">Import Slides</button>
                <button class="modal_close_button" onclick="document.getElementById('import_modal').classList.remove('show')">Cancel</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
